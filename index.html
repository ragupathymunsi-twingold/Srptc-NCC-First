<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRPTC · TN Medical Coy NCC</title>
<!-- CDN libraries for Excel / CSV / Word import (graceful fallback if blocked) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  :root{
    --navy:#0B1B3A; --navyDeep:#050d20; --panel:#122a52; --panel2:#0e2245;
    --gold:#E8B53A; --goldSoft:#F7CE5C; --red:#D24A3A; --sky:#3B95CF; --green:#2FB36A;
    --purple:#9B7CE6; --cream:#F6F4ED; --line:#26406f; --sub:#9fb0d0;
    --shadow:0 6px 22px rgba(0,0,0,.35); --glow:0 0 24px rgba(232,181,58,.25);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{color:var(--cream);min-height:100vh;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:
      radial-gradient(1100px 600px at 50% -120px,rgba(232,181,58,.10),transparent 60%),
      radial-gradient(900px 500px at 100% 100%,rgba(59,149,207,.10),transparent 55%),
      linear-gradient(180deg,#0a1c40 0%,#050d20 60%);
    background-attachment:fixed}
  .wrap{max-width:760px;margin:0 auto}
  .tricolour{display:flex;height:4px}
  .tricolour>div{flex:1}
  header{position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg,rgba(13,30,64,.96),rgba(9,22,48,.92));
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);box-shadow:0 4px 18px rgba(0,0,0,.3)}
  .hd-inner{padding:12px 16px 12px}
  .logos{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .logo{border-radius:11px;background:rgba(255,255,255,.95);border:1px solid var(--gold);
    display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;cursor:pointer;
    position:relative;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .logo img{width:100%;height:100%;object-fit:contain}
  .logo input{display:none}
  h1.title{font-size:15.5px;font-weight:800;text-align:center;margin:8px 0 0;line-height:1.2;
    letter-spacing:.01em}
  .subttl{font-size:12px;color:var(--sub);text-align:center;margin-top:2px;letter-spacing:.03em}
  .subttl b{color:var(--goldSoft)}
  .modebtn{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:6px 13px;
    font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--gold);
    background:rgba(232,181,58,.16);color:var(--gold);margin:8px auto 0;transition:.15s}
  .modebtn:active{transform:scale(.95)}
  .modebtn.cadet{border-color:var(--sky);background:rgba(59,149,207,.16);color:#8fcdf0}
  .modewrap{display:flex;justify-content:center}
  .crumb{display:flex;align-items:center;gap:8px;padding:8px 14px}
  .crumb button{display:inline-flex;align-items:center;gap:4px;background:none;border:none;
    color:var(--gold);font-weight:600;font-size:14px;cursor:pointer;padding:4px 6px}
  .crumb .now{font-weight:700;font-size:14px}
  main{padding:20px 16px 60px}
  .motto{text-align:center;margin-bottom:20px}
  .motto .lbl{font-size:11px;color:var(--sub);letter-spacing:.22em;text-transform:uppercase}
  .motto .big{font-size:25px;font-weight:900;color:var(--gold);letter-spacing:.05em;text-transform:uppercase;
    text-shadow:var(--glow);margin-top:2px}
  .card{border-radius:14px;padding:16px;margin-bottom:12px;
    background:linear-gradient(180deg,rgba(24,46,86,.92),rgba(15,32,64,.92));
    border:1px solid var(--line);box-shadow:var(--shadow)}
  .import-card{background:linear-gradient(180deg,rgba(16,40,74,.95),rgba(11,28,56,.95));border-color:rgba(59,149,207,.45)}
  .sec-head{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
    color:var(--goldSoft);margin:22px 2px 10px;display:flex;align-items:center;gap:8px}
  .sec-head::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}
  .tile{position:relative;border-radius:14px;padding:15px;text-align:left;cursor:pointer;color:var(--cream);
    background:linear-gradient(180deg,rgba(24,46,86,.9),rgba(14,30,60,.9));
    border:1px solid var(--line);box-shadow:var(--shadow);transition:transform .12s,border-color .12s}
  .tile:hover{border-color:rgba(232,181,58,.5)}
  .tile:active{transform:scale(.96)}
  .tile .ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    margin-bottom:11px;font-size:21px}
  .tile .nm{font-weight:700;font-size:13.5px;line-height:1.3}
  .badge{position:absolute;top:12px;right:12px;font-size:11px;font-weight:800;padding:2px 7px;
    border-radius:999px;min-width:20px;text-align:center;color:var(--navyDeep);box-shadow:0 2px 6px rgba(0,0,0,.35)}
  .row-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .muted{color:var(--sub);font-size:14px}
  .gold-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;
    border-radius:9px;padding:10px 16px;font-size:14px;font-weight:700;color:var(--navyDeep);cursor:pointer;
    background:linear-gradient(180deg,var(--goldSoft),var(--gold));box-shadow:0 3px 10px rgba(232,181,58,.3)}
  .gold-btn:active{transform:translateY(1px)}
  .gold-btn[disabled]{background:#5a4a1e;opacity:.6;cursor:not-allowed;box-shadow:none}
  .gold-btn.full{width:100%}
  .ghost{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:rgba(255,255,255,.02);
    border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:14px;font-weight:600;
    color:var(--cream);cursor:pointer}
  .ghost.danger{color:#F3ABA1;border-color:rgba(210,74,58,.55)}
  .file-btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--sky);border-radius:9px;
    padding:10px 16px;font-size:14px;font-weight:700;color:#8fcdf0;cursor:pointer;background:rgba(59,149,207,.08)}
  .file-btn input{display:none}
  .pill{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:2px 8px;
    border-radius:999px;letter-spacing:.03em}
  label.fld{display:block;margin-bottom:12px}
  label.fld>span{display:block;font-size:11px;font-weight:600;margin-bottom:4px;color:var(--goldSoft);letter-spacing:.04em}
  input,select,textarea{width:100%;background:var(--navyDeep);border:1px solid var(--line);
    border-radius:9px;padding:9px 11px;color:var(--cream);font-size:14px;outline:none;font-family:inherit}
  input:focus,select:focus,textarea:focus{border-color:var(--gold)}
  textarea{resize:vertical;min-height:60px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .empty{text-align:center;padding:48px 16px}
  .empty .eic{width:58px;height:58px;border-radius:999px;background:rgba(232,181,58,.12);
    display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:27px}
  .empty .et{font-weight:700;margin-bottom:4px}
  .empty .eh{font-size:14px;color:var(--sub)}
  .modal-bg{position:fixed;inset:0;z-index:50;background:rgba(3,8,20,.74);backdrop-filter:blur(3px);
    display:flex;align-items:flex-end;justify-content:center;padding:0}
  @media(min-width:560px){.modal-bg{align-items:center;padding:16px}}
  .modal{width:100%;max-width:460px;background:linear-gradient(180deg,#10254c,#0a1a38);
    border:1px solid var(--line);border-radius:18px 18px 0 0;overflow:hidden;max-height:92vh;overflow-y:auto;
    box-shadow:0 -10px 40px rgba(0,0,0,.5)}
  @media(min-width:560px){.modal{border-radius:18px}}
  .modal-h{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line)}
  .modal-h h3{margin:0;font-size:16px;font-weight:700}
  .modal-h button{background:none;border:none;color:var(--sub);cursor:pointer;font-size:20px;padding:4px}
  .modal-b{padding:16px}
  .list>*{margin-bottom:8px}
  .ico-circle{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;overflow:hidden;font-weight:800;background:var(--navyDeep);border:1px solid var(--line);color:var(--gold)}
  .ico-circle img{width:100%;height:100%;object-fit:cover}
  .flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
  .gap2{gap:8px}.gap3{gap:12px}.flex1{flex:1;min-width:0}.wrap-w{flex-wrap:wrap}
  .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .iconbtn{background:none;border:none;cursor:pointer;padding:6px;color:var(--sub);font-size:15px}
  .iconbtn.del{color:#F3ABA1}
  .small{font-size:12px;color:var(--sub)}
  .x-small{font-size:11px;color:#7e8fb3}
  .avatar{width:84px;height:84px;border-radius:999px;overflow:hidden;background:var(--navyDeep);
    border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;cursor:pointer;
    position:relative;box-shadow:var(--glow)}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .avatar input{display:none}
  .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .photo-grid .ph{position:relative;border-radius:9px;overflow:hidden;border:1px solid var(--line)}
  .photo-grid img{width:100%;height:70px;object-fit:cover;display:block}
  .photo-grid .rm{position:absolute;top:4px;right:4px;background:rgba(6,17,42,.85);color:#F3ABA1;
    border:none;border-radius:999px;width:20px;height:20px;cursor:pointer;font-size:11px}
  .gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  @media(min-width:560px){.gallery-grid{grid-template-columns:repeat(3,1fr)}}
  .seg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .seg button{padding:6px 14px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;
    background:rgba(255,255,255,.02);border:1px solid var(--line);color:var(--cream)}
  .seg button.on{background:linear-gradient(180deg,var(--goldSoft),var(--gold));border-color:var(--gold);color:var(--navyDeep)}
  .stat{border-radius:11px;padding:12px;text-align:center;background:var(--navyDeep);border:1px solid var(--line)}
  .stat .n{font-size:24px;font-weight:800}
  .stat .l{font-size:11px;color:var(--sub);margin-top:2px}
  .qopt{width:100%;text-align:left;border-radius:12px;padding:12px 16px;font-size:14px;font-weight:600;
    cursor:pointer;background:var(--panel);border:1px solid var(--line);color:var(--cream);
    display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .progress{height:6px;border-radius:999px;background:var(--panel);margin-bottom:20px}
  .progress>div{height:100%;background:linear-gradient(90deg,var(--gold),var(--goldSoft));border-radius:999px;transition:width .3s}
  .print-doc{background:#fff;color:#111;border-radius:8px;padding:14px}
  .print-doc table{width:100%;border-collapse:collapse;font-size:12.5px}
  .print-doc td,.print-doc th{padding:5px 4px}
  @media print{header,.crumb,.modebtn,.no-print{display:none!important}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ============================ STATE ============================ */
var C = {navy:"#0B1B3A",navyDeep:"#050d20",panel:"#122a52",gold:"#E8B53A",goldSoft:"#F7CE5C",
  red:"#D24A3A",sky:"#3B95CF",green:"#2FB36A",purple:"#9B7CE6",cream:"#F6F4ED",line:"#26406f",sub:"#9fb0d0"};

/* localStorage with graceful in-memory fallback */
var mem = {};
var store = {
  get:function(k,f){ try{var v=localStorage.getItem(k);return v==null?f:JSON.parse(v);}catch(e){return k in mem?mem[k]:f;} },
  set:function(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){mem[k]=v;} }
};
function uid(p){return p+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function todayISO(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){try{return new Date(d+"T00:00").toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});}catch(e){return d;}}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

function fileToDataURL(file,maxDim,quality){
  maxDim=maxDim||900;quality=quality||.72;
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){var img=new Image();
      img.onload=function(){var w=img.width,h=img.height;
        if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
        else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
        var cv=document.createElement("canvas");cv.width=w;cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);res(cv.toDataURL("image/jpeg",quality));};
      img.onerror=rej;img.src=r.result;};
    r.onerror=rej;r.readAsDataURL(file);});
}
function readArrayBuffer(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result);};r.onerror=rej;r.readAsArrayBuffer(file);});}
function readText(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result);};r.onerror=rej;r.readAsText(file);});}

/* ---------- spreadsheet / column helpers ---------- */
function normKey(k){return String(k||"").toLowerCase().replace(/[^a-z0-9]/g,"");}
function pickField(row,cands){var keys=Object.keys(row||{});for(var i=0;i<cands.length;i++){var c=cands[i];for(var j=0;j<keys.length;j++){if(normKey(keys[j])===c)return row[keys[j]];}}return "";}
function excelSerialToISO(n){var d=new Date(Math.round((n-25569)*86400*1000));return d.toISOString().slice(0,10);}
function basicCSV(text){
  var lines=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n").filter(function(l){return l.trim()!=="";});
  if(!lines.length)return [];
  function split(line){var out=[],cur="",q=false;for(var i=0;i<line.length;i++){var ch=line[i];
    if(q){if(ch==='"'){if(line[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
    else{if(ch==='"')q=true;else if(ch===','){out.push(cur);cur="";}else cur+=ch;}}out.push(cur);return out;}
  var headers=split(lines[0]).map(function(h){return h.trim();});
  return lines.slice(1).map(function(l){var cells=split(l);var o={};headers.forEach(function(h,i){o[h]=cells[i]!=null?cells[i]:"";});return o;});
}
function parseSpreadsheet(file){
  var name=(file.name||"").toLowerCase();
  if(/\.csv$/.test(name)){
    return readText(file).then(function(text){
      if(typeof Papa!=="undefined"){var res=Papa.parse(text,{header:true,skipEmptyLines:true,dynamicTyping:false,delimitersToGuess:[",","\t",";"]});return res.data||[];}
      return basicCSV(text);
    });
  }
  if(typeof XLSX==="undefined")return Promise.reject(new Error("xlsx library not available"));
  return readArrayBuffer(file).then(function(buf){
    var wb=XLSX.read(buf,{type:"array"});var sheet=wb.Sheets[wb.SheetNames[0]];
    return XLSX.utils.sheet_to_json(sheet,{defval:""}).filter(function(r){return Object.values(r).some(function(v){return String(v).trim()!=="";});});
  });
}
function triggerDownload(blob,filename){var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(url);},1000);}
function downloadCSV(filename,rows){
  if(!rows.length)rows=[{"No data":""}];
  var keys=Object.keys(rows[0]);
  var csv=keys.join(",")+"\n"+rows.map(function(r){return keys.map(function(k){var v=String(r[k]==null?"":r[k]).replace(/"/g,'""');return /[",\n]/.test(v)?'"'+v+'"':v;}).join(",");}).join("\n");
  triggerDownload(new Blob([csv],{type:"text/csv;charset=utf-8;"}),filename);
}
function downloadXLSX(filename,sheetName,rows){
  if(typeof XLSX==="undefined"){downloadCSV(filename.replace(/\.xlsx$/i,".csv"),rows);return;}
  var ws=XLSX.utils.json_to_sheet(rows.length?rows:[{"No data":""}]);
  var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,sheetName.slice(0,31));
  var out=XLSX.write(wb,{bookType:"xlsx",type:"array"});
  triggerDownload(new Blob([out],{type:"application/octet-stream"}),filename);
}

/* ============================ SEED ============================ */
var DB = {
  logos: store.get("ncc:logos",{snr:null,ncc:null,srptc:null}),
  about: store.get("ncc:about",{
    intro:"The National Cadet Corps unit at Sri Ramakrishna Polytechnic College was raised to instil discipline, leadership, comradeship and the spirit of selfless service among our students, and to develop them into responsible citizens and capable leaders.",
    venue:"Sri Ramakrishna Polytechnic College, Vattamalaipalayam, Coimbatore",
    unit:"TN Medical Coy NCC",inaugDate:"",inaugBy:"",notes:"",inaugPhotos:[]}),
  officers: store.get("ncc:officers",[{id:"o1",photo:"",name:"Ragupathy R",rank:"",designation:"Associate NCC Officer (ANO)",dept:"Mechanical Engineering, SRPTC",phone:"",email:"",message:"Welcome to the NCC family. Train hard, stay disciplined, and serve with pride."}]),
  cadets: store.get("ncc:cadets",[
    {id:"c1",reg:"TN24SDA001",name:"Sample Cadet — edit or delete me",rank:"Cadet",year:"I",contact:"",photo:"",parentMobile:"",email:"",address:""},
    {id:"c2",reg:"TN24SDA002",name:"Sample Cadet Two",rank:"Lance Corporal",year:"II",contact:"",photo:"",parentMobile:"",email:"",address:""}]),
  attendance: store.get("ncc:attendance",{}),
  corner: store.get("ncc:corner",[]),
  events: store.get("ncc:events",[
    {id:"e1",title:"Weekly Parade",cat:"Parade",date:"2026-06-27",time:"07:00",place:"SRPTC Ground",notes:"Drill + PT. Full uniform."},
    {id:"e2",title:"Map Reading Class",cat:"Training",date:"2026-07-04",time:"09:30",place:"Room ME-2",notes:"Bring protractor & pencil."},
    {id:"e3",title:"Annual NCC Day Function",cat:"Event",date:"2026-11-22",time:"10:00",place:"College Auditorium",notes:"Prize distribution & cultural programme."}]),
  certs: store.get("ncc:certs",[]),
  camps: store.get("ncc:camps",[]),
  hostedCamps: store.get("ncc:hostedcamps",[]),
  visitors: store.get("ncc:visitors",[]),
  notices: store.get("ncc:notices",[{id:"n1",title:"Welcome to TN Medical Coy NCC",body:"First-year cadets, report in PT kit for the next parade and carry your enrolment form.",date:todayISO(),pinned:true}]),
  enrol: store.get("ncc:enrol",[]),
  gallery: store.get("ncc:gallery",[]),
  reports: store.get("ncc:reports",[]),
  benefits: store.get("ncc:benefits",{
    general:["Builds character, discipline, leadership and team spirit.","Adventure training — trekking, camps, rifle shooting, and more.","National-level opportunities such as the Republic Day Camp (RDC) and youth exchange programmes.","Improves fitness, confidence and a sense of national service.","Certificates that carry real weight in higher studies and recruitment."],
    bCert:"The 'B' Certificate is awarded to Senior Division / Senior Wing cadets, normally after the second year of training, on attending the required camp and passing the exam. It is the stepping stone to the 'C' Certificate and is viewed favourably in several recruitments and admissions.",
    cCert:"The 'C' Certificate is the highest NCC certificate, awarded to third-year Senior Division / Wing cadets who hold the 'B' Certificate and clear the exam and camp requirements. Benefits include special entry schemes into the Armed Forces, bonus marks in many recruitments, and preference in several government jobs and admissions.",
    note:"Exact vacancy quotas, bonus marks and eligibility change from year to year and differ by recruiting authority. Always confirm against the latest official NCC and recruitment notifications."}),
  enrolInfo: store.get("ncc:enrolinfo",{
    eligibility:"• Must be a bona fide first-year student of SRPTC.\n• Should be medically fit for NCC training, parades and camps.\n• Willing to attend weekly parades, training classes and annual camps.\n• No serious disciplinary record with the institution.\n• Age and other norms follow current Directorate-level NCC guidelines.",
    procedure:"1. Fill the 1st Year Enrolment form in this app (or collect a physical form from the ANO office).\n2. Attach a recent passport-size photo and ID proof when asked.\n3. Attend the selection / medical screening as informed by the ANO.\n4. Selected cadets are issued a regimental number, uniform details and parade schedule.\n5. Report for the first parade in PT kit as briefed by the ANO.",
    bcEligibility:"'B' Certificate — for Senior Division/Wing cadets, typically after the second year of training, attending the requisite camp and clearing the exam.\n\n'C' Certificate — the highest certificate, for third-year cadets who already hold the 'B' Certificate, after attending the required camp and clearing the exam.\n\nFor both: regular parade attendance, good discipline and camp participation are mandatory. Always confirm with the latest Group HQ / Directorate circular."}),
  odUsers: store.get("ncc:odusers",[
    {id:"u1",role:"ANO",name:"Ragupathy R",loginId:"ano",password:"ano123"},
    {id:"u2",role:"NCC Officer",name:"NCC Officer",loginId:"nccofficer",password:"ncc123"},
    {id:"u3",role:"Class Tutor",name:"Class Tutor",loginId:"tutor",password:"tutor123"},
    {id:"u4",role:"HOD",name:"HOD - Mechanical",loginId:"hod",password:"hod123"},
    {id:"u5",role:"Principal",name:"Principal",loginId:"principal",password:"principal123"},
    {id:"u6",role:"Cadet",name:"Sample Cadet",loginId:"cadet1",password:"cadet123"}]),
  odRequests: store.get("ncc:odrequests",[]),

function photoStrip(photos,ctx){
  var h='<div class="flex items-center justify-between" style="margin-bottom:8px">'+
    '<p class="x-small" style="font-weight:700;color:'+C.goldSoft+';text-transform:uppercase;letter-spacing:.04em;margin:0">Photos'+(photos.length?" ("+photos.length+")":"")+'</p>'+

  if(!photos.length){h+='<div style="border-radius:9px;padding:24px 0;text-align:center;background:'+C.navyDeep+';border:1px dashed '+C.line+'"><div style="color:'+C.sub+';font-size:20px">📷</div><p class="x-small">No photos added yet</p></div>';}
  else{h+='<div class="photo-grid">';photos.forEach(function(p){h+='<div class="ph"><img src="'+p.src+'">'+(officer?'<button class="rm" onclick="removeStripPhoto(\''+ctx+'\',\''+p.id+'\')">×</button>':'')+'</div>';});h+='</div>';}
  return h;
}
function addStripPhotos(ctx,input){
  var files=[].slice.call(input.files);if(!files.length)return;
  Promise.all(files.map(function(f){return fileToDataURL(f,1000,.7).then(function(s){return{id:uid("p"),src:s};});}))
    .then(function(items){applyStrip(ctx,function(arr){return arr.concat(items);});});
}
function removeStripPhoto(ctx,pid){applyStrip(ctx,function(arr){return arr.filter(function(p){return p.id!==pid;});});}
function applyStrip(ctx,fn){
  if(ctx==="about-inaug"){DB.about.inaugPhotos=fn(DB.about.inaugPhotos||[]);persist("about");}
  else if(ctx.indexOf("hosted-")===0){var id=ctx.slice(7);var c=DB.hostedCamps.find(function(x){return x.id===id;});c.photos=fn(c.photos||[]);persist("hostedCamps");}
  else if(ctx.indexOf("visitor-")===0){var id2=ctx.slice(8);var v=DB.visitors.find(function(x){return x.id===id2;});v.photos=fn(v.photos||[]);persist("visitors");}
  render();
}

function attPct(id){var p=0,t=0;for(var d in DB.attendance){var day=DB.attendance[d];if(day[id]){t++;if(day[id]==="P")p++;}}return t?Math.round(p/t*100):null;}

  }

      '<div class="flex items-center gap2 wrap-w" style="margin-top:2px"><span class="small">'+esc(c.reg||"No reg. no.")+'</span>'+
      pill(c.rank,C.goldSoft)+pill("Year "+c.year,"#8fcdf0","rgba(59,149,207,.16)")+
      (pct!==null?pill(pct+"%",pct>=75?"#7fe0a8":"#F3ABA1",pct>=75?"rgba(47,179,106,.16)":"rgba(210,74,58,.16)"):"")+'</div></div>'+

function importCadets(input){
  var f=input.files[0];if(!f)return;input.value="";setImportMsg("longroll","Reading…");
  parseSpreadsheet(f).then(function(rows){
    var mapped=rows.map(function(r){
      var y=String(pickField(r,["year","yr"])||"I").trim().toUpperCase();
      return {id:uid("c"),
        name:String(pickField(r,["name","cadetname","fullname","studentname"])||"").trim(),
        reg:String(pickField(r,["reg","regno","regimentalno","enrolmentno","enrollmentno","rollno"])||"").trim(),
        rank:String(pickField(r,["rank"])||"Cadet").trim()||"Cadet",
        year:["I","II","III"].indexOf(y)>=0?y:"I",
        contact:String(pickField(r,["contact","phone","mobile"])||"").trim(),
        parentMobile:String(pickField(r,["parentmobile","parentphone","fathermobile","guardianmobile","parentcontact"])||"").trim(),
        email:String(pickField(r,["email","emailid","mailid"])||"").trim(),
        address:String(pickField(r,["address","fulladdress","residenceaddress"])||"").trim(),photo:""};
    }).filter(function(c){return c.name;});
    if(!mapped.length){setImportMsg("longroll","No usable rows found — check the Name column exists.");return;}
    DB.cadets=DB.cadets.concat(mapped);persist("cadets");
    importMsgs.longroll="Imported "+mapped.length+" cadet"+(mapped.length!==1?"s":"")+".";render();
  }).catch(function(){setImportMsg("longroll",(typeof XLSX==="undefined"&&!/\.csv$/i.test(f.name))?"Excel library didn't load (check internet) — try a .csv instead.":"Could not read that file. Use .csv, .xlsx or .xls.");});
}
function cadetRows(){return DB.cadets.map(function(c){return{Name:c.name,"Reg No":c.reg,Rank:c.rank,Year:c.year,Contact:c.contact||"","Parent's Mobile":c.parentMobile||"","Email ID":c.email||"","Full Address":c.address||""};});}

function saveCadet(){

      '<span class="x-small" style="font-weight:700;color:'+typeCol(e.cat)+'">'+wd+'</span>'+
      '<span style="font-size:20px;font-weight:800;line-height:1">'+e.date.slice(8,10)+'</span><span class="x-small">'+mo+'</span></div>'+
      '<div class="flex1"><div class="flex items-center gap2 wrap-w" style="margin-bottom:4px"><span style="font-weight:700">'+esc(e.title)+'</span>'+pill(e.cat,typeCol(e.cat),typeCol(e.cat)+"22")+'</div>'+
      '<div class="flex items-center gap3 wrap-w small">'+'<span>🕐 '+esc(e.time)+'</span>'+(e.place?'<span>📍 '+esc(e.place)+'</span>':'')+'</div>'+

      '</div></div>';
  });h+='</div>';return h;

function importEvents(input,catsStr){
  var cats=catsStr.split(",");var key=cats[0]==="Parade"?"parade":"events";
  var f=input.files[0];if(!f)return;input.value="";setImportMsg(key,"Reading…");
  parseSpreadsheet(f).then(function(rows){
    var mapped=rows.map(function(r){
      var catV=String(pickField(r,["cat","category","type"])||"").trim();
      var matched=cats.filter(function(c){return c.toLowerCase()===catV.toLowerCase();})[0]||cats[0];
      var dateV=pickField(r,["date"]);
      if(typeof dateV==="number")dateV=excelSerialToISO(dateV);
      else if(dateV){var d=new Date(dateV);dateV=isNaN(d)?"":d.toISOString().slice(0,10);}
      return {id:uid("e"),title:String(pickField(r,["title","eventtitle","name","subject"])||"").trim(),cat:matched,
        date:dateV||todayISO(),time:String(pickField(r,["time"])||"07:00").trim(),
        place:String(pickField(r,["place","location","venue"])||"").trim(),notes:String(pickField(r,["notes","remarks","description"])||"").trim()};
    }).filter(function(e){return e.title;});
    if(!mapped.length){setImportMsg(key,"No usable rows found — check the Title and Date columns.");return;}
    DB.events=DB.events.concat(mapped);persist("events");
    importMsgs[key]="Imported "+mapped.length+" entr"+(mapped.length!==1?"ies":"y")+".";render();
  }).catch(function(){setImportMsg(key,(typeof XLSX==="undefined"&&!/\.csv$/i.test(f.name))?"Excel library didn't load — try a .csv instead.":"Could not read that file. Use .csv, .xlsx or .xls.");});
}

    fld("Title",inp("ev-title",e.title))+
    '<div class="two">'+fld("Type",sel("ev-cat",cats,e.cat))+fld("Time",inp("ev-time",e.time,"time"))+'</div>'+

function odAct(id,action,reason){
  var s=DB.odSession;
  DB.odRequests=DB.odRequests.map(function(x){if(x.id!==id)return x;var ap=Object.assign({},x.approvals);ap[s.role]={status:action,by:s.name,date:todayISO(),reason:reason||""};return Object.assign({},x,{approvals:ap});});
  persist("odRequests");closeModal();render();
}
function odReject(id){
  modal={title:"Reject application",html:fld("Reason for rejection",ta("rj-reason","",80))+'<button class="gold-btn full" onclick="confirmReject(\''+id+'\')">✔ Confirm rejection</button>'};
  openModal();
}
function confirmReject(id){var r=val("rj-reason").trim();if(!r){alert("Please mention the reason.");return;}odAct(id,"Rejected",r);}
function odView(id){
  var r=DB.odRequests.find(function(x){return x.id===id;});
  var fields=[["Cadet Name",r.cadetName],["Register Number",r.reg],["Year / Department",r.year+" / "+r.dept],
    ["Purpose of Visit",r.purpose],["Place to Visit",r.place],["From – To",fmtDate(r.from)+" – "+fmtDate(r.to)],
    ["Total Days",r.days],["Mode of Transport",r.mode],["Cadet's Mobile",r.cadetMobile],["Parent's Mobile",r.parentMobile],["Applied On",fmtDate(r.appliedOn)]];
  var doc='<div class="print-doc"><p style="font-weight:800;text-align:center;margin:0 0 4px;font-size:14px">Sri Ramakrishna Polytechnic College</p>'+
    '<p style="text-align:center;margin:0 0 10px;font-size:12px;color:#444">NCC Cadet On-Duty Application</p><table><tbody>';
  fields.forEach(function(f){doc+='<tr style="border-bottom:1px solid #ddd"><td style="font-weight:700;width:42%;vertical-align:top">'+f[0]+'</td><td>'+esc(f[1]||"—")+'</td></tr>';});
  doc+='</tbody></table><p style="font-weight:700;margin:12px 0 4px;font-size:13px">Approval Status</p><table><thead><tr style="background:#eee"><th style="text-align:left">Role</th><th style="text-align:left">Status</th><th style="text-align:left">By / Date</th><th style="text-align:left">Reason</th></tr></thead><tbody>';
  OD_ROLES.forEach(function(role){var a=r.approvals[role];doc+='<tr style="border-bottom:1px solid #eee"><td>'+role+'</td><td>'+a.status+'</td><td>'+(a.by?esc(a.by)+" · "+fmtDate(a.date):"—")+'</td><td>'+esc(a.reason||"—")+'</td></tr>';});
  doc+='</tbody></table></div>';
  modal={title:"On-Duty Application",html:doc+
    '<div style="margin-top:12px"><button class="gold-btn full no-print" onclick="window.print()">🖨 Print / Save as PDF</button></div>'+
    '<p class="x-small no-print" style="margin-top:8px">Tip: in the print dialog choose “Save as PDF” to download a copy.</p>'};
  openModal();
}

    '<div class="grid" style="grid-template-columns:repeat(3,1fr)">'+stat(stats.byYear.I||0,"Year I")+stat(stats.byYear.II||0,"Year II")+stat(stats.byYear.III||0,"Year III")+'</div>'+
    '<p class="x-small" style="margin-top:12px">'+stats.parades+' parade entries · '+stats.events+' events · '+stats.paradeDays+' attendance days recorded.</p></div>';
  h+='<div class="row-head"><p class="x-small" style="font-weight:700;color:'+C.goldSoft+';text-transform:uppercase;letter-spacing:.04em;margin:0">Year-wise reports</p>'+

  if(officer) h+=importCard("Import report from a Word document","extracts text from a .docx so you can review before saving",".docx","importReport(this)","reports");
  var list=DB.reports.slice().sort(function(a,b){return (b.year||"").localeCompare(a.year||"");});
  if(!list.length){h+=emptyState("📄","No year-wise reports",officer?"Add a report or import one from a Word document.":"Reports will appear here.");}
  else{h+='<div class="list">';list.forEach(function(r){
    h+='<div class="card"><div class="flex items-center justify-between gap3"><div class="flex1">'+
      '<div class="flex items-center gap2 wrap-w" style="margin-bottom:4px">'+pill(r.year,C.gold)+'<span style="font-weight:700">'+esc(r.title)+'</span></div>'+
      '<p style="font-size:14px;color:#c3cee4;white-space:pre-wrap;line-height:1.6;margin:0">'+esc(r.body)+'</p></div>'+
      (officer?'<div class="flex" style="flex-direction:column"><button class="iconbtn" onclick="editReport(\''+r.id+'\')">✏️</button><button class="iconbtn del" onclick="delItem(\'reports\',\''+r.id+'\')">🗑️</button></div>':'')+
      '</div></div>';
  });h+='</div>';}

function importReport(input){
  var f=input.files[0];if(!f)return;input.value="";
  if(!/\.docx$/i.test(f.name)){setImportMsg("reports","Only .docx Word files are supported (not the older .doc).");return;}
  if(typeof mammoth==="undefined"){setImportMsg("reports","Word import library didn't load (check your internet).");return;}
  setImportMsg("reports","Reading…");
  readArrayBuffer(f).then(function(buf){return mammoth.extractRawText({arrayBuffer:buf});}).then(function(res){
    importMsgs.reports="";
    var text=(res.value||"").trim();
    editReport(null,{year:String(new Date().getFullYear()),title:f.name.replace(/\.docx$/i,""),body:text||"(No text could be extracted — please paste content manually.)"});
  }).catch(function(){setImportMsg("reports","Could not read that Word document.");});
}
function editReport(id,prefill){
  var r=id?DB.reports.find(function(x){return x.id===id;}):(prefill||{year:String(new Date().getFullYear()),title:"",body:""});
  modal={id:id,title:id?"Edit report":"Add year report",html:

    fld("Report",ta("rp-body",r.body,140))+'<button class="gold-btn full" onclick="saveReport()">✔ Save</button>'};
  openModal();
}
function saveReport(){
  var o={id:modal.id||uid("y"),year:val("rp-year"),title:val("rp-title"),body:val("rp-body")};
  if(modal.id)DB.reports=DB.reports.map(function(x){return x.id===o.id?o:x;});else DB.reports.push(o);

}

/* ---------- QUIZ ---------- */
var quizState={level:"All",session:null,best:store.get("ncc:quizbest",null)};
function viewQuiz(){
  var s=quizState.session;
  if(s&&s.i>=s.qs.length){
    var score=s.answers.reduce(function(a,x,i){return a+(x===s.qs[i].a?1:0);},0);
    var pct=Math.round(score/s.qs.length*100);
    if(quizState.best==null||pct>quizState.best){quizState.best=pct;store.set("ncc:quizbest",pct);}
    var h='<div class="card" style="text-align:center;padding:24px"><div style="font-size:40px">🏅</div>'+
      '<p class="small">Your score</p><p style="font-size:36px;font-weight:800;margin:4px 0;color:'+(pct>=60?"#7fe0a8":C.goldSoft)+'">'+score+'/'+s.qs.length+'</p>'+
      '<p class="small" style="margin-bottom:12px">'+pct+'% · '+(pct>=80?"Outstanding, cadet!":pct>=60?"Well done — keep drilling.":"Revise and try again.")+'</p>'+
      '<button class="gold-btn" onclick="quizStart()">↻ Try again</button></div>';
    h+='<p style="font-weight:700;margin:0 0 8px">Review</p><div class="list">';
    s.qs.forEach(function(q,i){var ok=s.answers[i]===q.a;
      h+='<div class="card" style="border-color:'+(ok?"rgba(47,179,106,.4)":"rgba(210,74,58,.4)")+'">'+
        '<p style="font-weight:600;margin:0 0 8px">'+(i+1)+'. '+esc(q.q)+'</p>'+
        '<p style="font-size:14px;margin:0;color:'+(ok?"#7fe0a8":"#F3ABA1")+'">'+(ok?"✓ ":"✗ Your answer: "+esc(q.o[s.answers[i]])+" — ")+'Correct: <b>'+esc(q.o[q.a])+'</b></p></div>';
    });h+='</div>';return h;
  }
  if(s){
    var q=s.qs[s.i];var picked=s.picked;var answered=picked!==undefined;
    var h2='<div class="flex items-center justify-between" style="margin-bottom:12px">'+pill(q.cat+" · Cert "+q.lvl,C.gold)+'<span class="small" style="font-weight:700">'+(s.i+1)+' / '+s.qs.length+'</span></div>';
    h2+='<div class="progress"><div style="width:'+(s.i/s.qs.length*100)+'%"></div></div>';
    h2+='<h3 style="font-size:18px;font-weight:700;margin:0 0 16px">'+esc(q.q)+'</h3>';
    q.o.forEach(function(opt,idx){var bg=C.panel,fg=C.cream,bd=C.line;
      if(answered){if(idx===q.a){bg="rgba(47,179,106,.16)";fg="#7fe0a8";bd="#7fe0a8";}else if(idx===picked){bg="rgba(210,74,58,.16)";fg="#F3ABA1";bd="#F3ABA1";}}
      h2+='<button class="qopt" style="background:'+bg+';color:'+fg+';border-color:'+bd+';cursor:'+(answered?"default":"pointer")+'" onclick="'+(answered?"":"quizAnswer("+idx+")")+'"><span>'+esc(opt)+'</span>'+(answered&&idx===q.a?'<span>✓</span>':answered&&idx===picked?'<span>✕</span>':'')+'</button>';
    });
    if(answered)h2+='<div style="margin-top:20px"><button class="gold-btn full" onclick="quizNext()">'+(s.i+1===s.qs.length?"See results":"Next question")+' ›</button></div>';
    return h2;
  }
  var pool=quizState.level==="All"?QUIZ:QUIZ.filter(function(q){return q.lvl===quizState.level;});
  var h3='<p class="muted" style="margin-bottom:14px">Practice for the NCC A / B / C certificate exams — general knowledge, drill, map reading and more.</p>';
  h3+='<div class="card"><p class="x-small" style="font-weight:600;color:'+C.goldSoft+';letter-spacing:.04em;margin:0 0 8px">CHOOSE A LEVEL</p><div class="seg" style="margin:0">';
  ["All","A","B","C"].forEach(function(lv){var count=lv==="All"?QUIZ.length:QUIZ.filter(function(q){return q.lvl===lv;}).length;
    h3+='<button class="'+(quizState.level===lv?"on":"")+'" onclick="quizLevel(\''+lv+'\')">'+(lv==="All"?"All levels":"Cert "+lv)+' <span style="opacity:.7">('+count+')</span></button>';});
  h3+='</div></div>';
  h3+='<div class="card" style="text-align:center;padding:24px"><div style="font-size:36px">📘</div>'+
    '<p style="font-weight:700;margin:8px 0 4px">'+Math.min(10,pool.length)+'-question round</p>'+
    '<p class="small" style="margin-bottom:16px">Questions are shuffled each time.'+(quizState.best!=null?" Best so far: <b style=\"color:"+C.gold+"\">"+quizState.best+"%</b>":"")+'</p>'+
    '<button class="gold-btn" onclick="quizStart()">Start quiz ›</button></div>';
  return h3;
}
function quizLevel(lv){quizState.level=lv;render();}
function quizStart(){var pool=quizState.level==="All"?QUIZ:QUIZ.filter(function(q){return q.lvl===quizState.level;});
  quizState.session={qs:pool.slice().sort(function(){return Math.random()-.5;}).slice(0,Math.min(10,pool.length)),i:0,answers:[],picked:undefined};render();}
function quizAnswer(idx){quizState.session.answers.push(idx);quizState.session.picked=idx;render();}
function quizNext(){quizState.session.i++;quizState.session.picked=undefined;render();}

function sel(id,opts,value){return '<select id="'+id+'">'+opts.map(function(o){return '<option'+(o===value?" selected":"")+'>'+esc(o)+'</option>';}).join("")+'</select>';}
function val(id){var el=document.getElementById(id);return el?el.value:"";}
function avatar(id,src){
  return '<label class="avatar"><input type="file" accept="image/*" onchange="pickAvatar(\''+id+'\',this)">'+
    '<span id="'+id+'-prev" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;color:'+C.gold+'">'+(src?'<img src="'+src+'" style="width:100%;height:100%;object-fit:cover">':'📷')+'</span>'+
    '<span style="position:absolute;bottom:0;right:0;width:26px;height:26px;background:'+C.gold+';border:2px solid '+C.navy+';border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:12px">✏️</span></label>';
}
function pickAvatar(id,input){var f=input.files[0];if(!f)return;
  fileToDataURL(f,500,.78).then(function(url){
    window["__avatar_"+id.replace("-","")]=url;
    var prev=document.getElementById(id+"-prev");if(prev)prev.innerHTML='<img src="'+url+'" style="width:100%;height:100%;object-fit:cover">';
  });}
function delItem(coll,id){
  if(!confirm("Delete this item?"))return;
  DB[coll]=DB[coll].filter(function(x){return x.id!==id;});persist(coll);render();
}

/* ---------- MODAL ---------- */
function openModal(){render();}
function closeModal(){modal=null;render();}
function mountModal(){
  var bg=document.createElement("div");bg.className="modal-bg";bg.onclick=function(e){if(e.target===bg)closeModal();};
  bg.innerHTML='<div class="modal" onclick="event.stopPropagation()">'+
    '<div class="tricolour" style="height:3px"><div style="background:'+C.red+'"></div><div style="background:'+C.navy+'"></div><div style="background:'+C.sky+'"></div></div>'+
    '<div class="modal-h"><h3>'+esc(modal.title)+'</h3><button onclick="closeModal()">×</button></div>'+
    '<div class="modal-b">'+modal.html+'</div></div>';
  document.body.appendChild(bg);
  window.__currentModalBg=bg;
}

render();
</script>
</body>
</html>
